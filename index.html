<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./src/style/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>daily-calorie-tracker</title>
  </head>
  <body>
  <nav id="navbar">
    <a href="#" class="nav-brand">My Nutrition</a>
  </nav>

  <div class="container" id="main">
    <h2>음식 추가</h2>
    <form id="create-form">
      <div class="nutrition-values">
        <label for="create-name">Food name:</label>
        <input
                class="nutrition-input"
                id="create-name"
                placeholder="입력해주세요"
        />
        <label for="create-carbs">Carbs:</label>
        <input
                class="nutrition-input"
                type="number"
                id="create-carbs"
                min="0"
                max="10000"
                placeholder="0 g"
        />
        <label for="create-protein">Protein:</label>
        <input
                class="nutrition-input"
                type="number"
                id="create-protein"
                min="0"
                max="10000"
                placeholder="0 g"
        />
        <label for="create-fat">Fat:</label>
        <input
                class="nutrition-input"
                type="number"
                id="create-fat"
                min="0"
                max="10000"
                placeholder="0 g"
        />
        <div></div>
        <input type="submit" class="btn btn-default create-submit" value="Add" />
      </div>
    </form>
    <h2>칼로리 차트</h2>
    <canvas id="app-chart" width="100%"></canvas>
    <h2>칼로리 내역</h2>
    <div class="card" id="total-calories-container">
      <h3>Total calories logged: <span id="total-calories">0</span></h3>
    </div>
    <ul id="food-list"></ul>
  </div>
  </body>

  <script type="module" src="./src/main.js"></script>
</html>
